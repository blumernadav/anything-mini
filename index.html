<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything Mini</title>
    <link id="skin-stylesheet" rel="stylesheet" href="skins/modern.css">
</head>

<body>
    <div class="app-layout">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="streak-widget" id="streak-widget" title="Daily streak">
                <span class="streak-fire" id="streak-fire">🔥</span>
                <span class="streak-count" id="streak-count">0</span>
                <button class="streak-checkin-btn" id="streak-checkin-btn" title="Close your day">🌙</button>
            </div>

            <div class="top-bar-right">
                <button class="top-bar-btn top-bar-toggle" id="hide-done-btn" title="Show done">✓</button>
                <button class="top-bar-btn top-bar-toggle" id="hide-past-btn" title="Hide past">⏳</button>
                <button class="top-bar-btn top-bar-toggle" id="deep-view-btn" title="Show all layers">🔽</button>
                <button class="top-bar-btn top-bar-toggle" id="show-unscheduled-btn" title="Show unscheduled"
                    style="display:none">📅</button>
                <button class="top-bar-btn project-search-toggle" id="project-search-toggle"
                    title="Search projects">🔍</button>
                <button class="top-bar-btn" id="settings-btn" title="Settings">⚙</button>
                <button class="top-bar-btn" id="dark-mode-toggle" title="Toggle dark mode">🌙</button>
                <span class="greeting-time" id="greeting-time">00:00</span>
            </div>
        </div>

        <!-- Left: Projects -->
        <aside class="sidebar sidebar-left" id="sidebar-projects">
            <div class="sidebar-header">
                <h2 class="sidebar-title"><span class="title-icon">📁</span> Projects</h2>
            </div>
            <div class="project-search project-search-hidden" id="project-search">
                <input type="text" id="project-search-input" class="project-search-input" placeholder="Search..."
                    autocomplete="off">
                <button class="project-search-clear" id="project-search-clear" title="Clear search">×</button>
            </div>
            <div class="project-tree" id="project-tree">
                <div class="empty-state" id="projects-empty">
                    <span class="empty-icon">📂</span>
                    <span>No projects yet</span>
                    <span class="empty-hint">start with something small</span>
                </div>
            </div>
            <div class="scroll-to-selected-banner" id="scroll-to-selected-banner" style="display:none;">
                <span class="scroll-to-selected-arrow" id="scroll-to-selected-arrow">↓</span>
                <span class="scroll-to-selected-text" id="scroll-to-selected-text">Selected item</span>
            </div>
        </aside>

        <!-- Divider: Left ↔ Center -->
        <div class="panel-divider" id="divider-left" data-divider="left"></div>

        <!-- Center -->
        <main class="main-content" id="main-content">
            <section class="main-section section-actions" id="section-actions">
                <div class="section-header" id="section-header-actions">
                    <div class="header-breadcrumb-what" id="header-breadcrumb-what"></div>
                    <div class="header-live-slot" id="header-live-slot"></div>
                    <div class="header-right-cluster">
                        <div class="header-breadcrumb-when" id="header-breadcrumb-when"></div>
                        <div class="header-status-cluster">
                            <div class="pressure-bar" id="pressure-bar">
                                <div class="pressure-bar-fill" id="pressure-bar-fill"></div>
                                <span class="pressure-bar-label" id="pressure-bar-label"></span>
                            </div>
                        </div>
                    </div>
                    <span class="pressure-bar-missing" id="pressure-bar-missing"></span>
                </div>
                <div class="action-input-row" id="action-input-row">
                    <input class="action-input" id="action-input" placeholder="What's on your mind?" type="text"
                        autocomplete="off">
                    <button class="action-input-btn" id="action-input-btn" title="Add">→</button>
                </div>
                <div class="actions-list" id="actions-list">
                    <div class="empty-state" id="actions-empty">
                        <span class="empty-icon">✨</span>
                        <span>What's on your mind?</span>
                        <span class="empty-hint">one small win at a time</span>
                    </div>
                </div>
            </section>

        </main>

        <!-- Divider: Center ↔ Right -->
        <div class="panel-divider" id="divider-right" data-divider="right"></div>

        <!-- Right: Timeline -->
        <aside class="sidebar sidebar-right" id="sidebar-timeline">
            <div class="sidebar-header">
                <h2 class="sidebar-title"><span class="title-icon">🕐</span> Timeline</h2>
            </div>

            <div class="time-context" id="time-context">
                <div class="horizon-layer horizon-layer-epoch" id="horizon-epoch-layer">
                    <button class="date-nav-btn epoch-nav-btn" id="epoch-nav-prev" title="Previous epoch">‹</button>
                    <div class="epoch-nav-display">
                        <span class="horizon-layer-icon" id="epoch-nav-icon">📦</span>
                        <span class="horizon-layer-label" id="epoch-nav-label">Ongoing</span>
                    </div>
                    <button class="date-nav-btn epoch-nav-btn" id="epoch-nav-next" title="Next epoch">›</button>
                </div>
                <div class="horizon-layer horizon-layer-month" id="horizon-month-layer">
                    <button class="date-nav-btn month-nav-btn" id="month-nav-prev" title="Previous month">‹</button>
                    <div class="month-nav-display">
                        <span class="horizon-layer-icon">📅</span>
                        <span class="horizon-layer-label" id="month-nav-label">Month</span>
                        <button class="date-nav-today-btn" id="month-nav-this-btn" style="display:none">This
                            Month</button>
                    </div>
                    <button class="date-nav-btn month-nav-btn" id="month-nav-next" title="Next month">›</button>
                </div>
                <div class="horizon-layer horizon-layer-week" id="horizon-week-layer">
                    <button class="date-nav-btn week-nav-btn" id="week-nav-prev" title="Previous week">‹</button>
                    <div class="week-nav-display">
                        <span class="horizon-layer-icon">📆</span>
                        <span class="horizon-layer-label" id="week-nav-label">Week</span>
                        <input type="date" id="week-nav-picker" class="date-nav-picker">
                        <button class="date-nav-today-btn" id="week-nav-today-btn" style="display:none">This
                            Week</button>
                    </div>
                    <button class="date-nav-btn week-nav-btn" id="week-nav-next" title="Next week">›</button>
                </div>
                <div class="horizon-layer horizon-layer-day date-nav" id="horizon-day-layer">
                    <button class="date-nav-btn" id="date-nav-prev" title="Previous day">‹</button>
                    <div class="date-nav-display">
                        <span class="date-nav-date" id="date-nav-date">—</span>
                        <input type="date" id="date-nav-picker" class="date-nav-picker">
                        <button class="date-nav-today-btn" id="date-nav-today-btn" title="Back to today">Today</button>
                    </div>
                    <button class="date-nav-btn" id="date-nav-next" title="Next day">›</button>
                </div>
                <div class="horizon-layer horizon-layer-session" id="horizon-session-layer">
                    <button class="date-nav-btn session-nav-btn" id="session-nav-prev"
                        title="Previous session">‹</button>
                    <div class="session-nav-display">
                        <span class="horizon-layer-icon" id="session-layer-icon">✨</span>
                        <span class="horizon-layer-label" id="session-nav-label">Free Time</span>
                        <button class="date-nav-today-btn" id="session-nav-now-btn" style="display:none">Now</button>
                    </div>
                    <button class="date-nav-btn session-nav-btn" id="session-nav-next" title="Next session">›</button>
                </div>
            </div>

            <div class="timeline-list" id="timeline-list">
                <div class="empty-state" id="timeline-empty">
                    <span class="empty-icon">📅</span>
                    <span>Your day unfolds here</span>
                    <span class="empty-hint">log as you go</span>
                </div>
            </div>

            <div class="quick-log">
                <input type="text" id="quick-log-input" placeholder="What are you up to?" autocomplete="off">
                <button class="btn-log" id="quick-log-btn" title="Log">→</button>
            </div>
        </aside>

        <!-- Taskbar (Win95 only — hidden by other skins) -->
        <div class="taskbar" id="taskbar">
            <button class="start-button">
                <span class="start-flag">
                    <span></span><span></span><span></span><span></span>
                </span>
                Start
            </button>
            <div class="taskbar-divider"></div>
            <div class="taskbar-window">📋 Anything Mini</div>
            <div class="taskbar-clock" id="taskbar-clock">00:00</div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>

</html>
